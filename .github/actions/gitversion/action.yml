outputs:
  semVer:
    description: "Semantic Version generated by GitVersion"
    value: ${{ steps.get-version.outputs.semVer }}

runs:
  using: "composite"
  steps:
  - name: "Set Version Output"
    id: get-version
    run: |
      # Detect OS and set appropriate GitVersion URL
      if [[ "$RUNNER_OS" == "Linux" ]]; then
        GIT_VERSION_URL="https://github.com/GitTools/GitVersion/releases/download/5.12.0/gitversion-linux-x64-5.12.0.tar.gz"
        INSTALL_DIR="/usr/local/bin"
      elif [[ "$RUNNER_OS" == "macOS" ]]; then
        GIT_VERSION_URL="https://github.com/GitTools/GitVersion/releases/download/5.12.0/gitversion-osx-x64-5.12.0.tar.gz"
        INSTALL_DIR="/usr/local/bin"
      else
        echo "Unsupported OS: $RUNNER_OS"
        exit 1
      fi

      echo "Downloading GitVersion for $RUNNER_OS from $GIT_VERSION_URL"
      curl -sSfL $GIT_VERSION_URL | tar -xz -C $INSTALL_DIR gitversion
      chmod +x $INSTALL_DIR/gitversion

      cat <<EOF > GitVersion.yml
      mode: ContinuousDeployment
      branches:
        main:
          increment: Patch
          prevent-increment-of-merged-branch-version: true
        master:
          increment: Patch
          prevent-increment-of-merged-branch-version: true
        develop:
          increment: Minor
          track-merge-target: true
        feature:
          increment: Patch
          source-branches: [develop]
        release:
          increment: Patch
          source-branches: [main]
          track-merge-target: true
        hotfix:
          increment: Patch
          source-branches: [main]
          track-merge-target: true
      EOF
 
      gitversion /output json > version.json
      cat version.json
      VERSION=$(jq -r '.SemVer' version.json)
      echo "semVer=$VERSION" >> $GITHUB_OUTPUT

    shell: bash