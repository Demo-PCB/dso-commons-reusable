# ./.github/actions/cosign/action.yml
# Composite Action: Sets up the complete Composite build environment.

name: 'Cosign Image'
description: 'Sign an Image with the keyless mode'

inputs:
  workflow_name:
    description: "Workflow Name for validate and sign"
    required: true
    type: string
    default: 'ci' 
  mode:
    description: "Mode verify or sign"
    required: true
    type: string
    default: 'verify'
  reference_image:
    description: "Reference Image to sign"
    required: true
    type: string
    default: ''
  predicate_path:
    description: "Predicate file path"
    required: true
    type: string
    default: ''
  output_result_path:
    description: 'Output for sign'
    required: false
    type: string
    default: ''
runs:
  using: "composite"
  steps:
    - name: Install Cosign
      uses: sigstore/cosign-installer@v3.8.0
      with:
        cosign-release: 'v2.4.1'
      continue-on-error: true
      id: cosign-install
    
    - name: Install Cosign Fallback
      if: steps.cosign-install.outcome == 'failure'
      shell: bash
      run: |
        echo "Cosign installer failed, trying manual installation..."
        # Try to install cosign manually
        COSIGN_VERSION="v2.4.1"
        ARCH=$(uname -m)
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        
        if [ "$ARCH" = "x86_64" ]; then
          ARCH="amd64"
        elif [ "$ARCH" = "aarch64" ]; then
          ARCH="arm64"
        fi
        
        # Download and install cosign
        curl -sLO "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-${OS}-${ARCH}"
        sudo mv "cosign-${OS}-${ARCH}" /usr/local/bin/cosign
        sudo chmod +x /usr/local/bin/cosign
        
        # Verify installation
        cosign version
    - name: Generate Sign and certificate 
      shell: bash
      id: cosign-sign
      if:  inputs.mode=='sign'
      run: >
        cosign attest 
        --predicate ${{inputs.predicate_path}} 
        --type custom 
        --yes  
        ${{inputs.reference_image}} 
    - name: Verify Sign
      shell: bash
      id: cosign-verify
      if:  inputs.mode=='verify'
      run: >
        cosign verify-attestation
        --type custom 
        --certificate-identity-regexp="https://github.com/Demo-PCB/dso-*"
        --certificate-oidc-issuer=https://token.actions.githubusercontent.com
        --output-file="${{inputs.output_result_path}}"  
        ${{inputs.reference_image}} 
